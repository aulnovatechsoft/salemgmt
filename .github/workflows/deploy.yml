name: Deploy to Private Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build backend (server)
        run: |
          bun build ./server.ts \
            --outdir build \
            --target bun \
            --minify \
            --sourcemap=inline  # optional – remove for smaller final size

      - name: Build web frontend (Expo)
        run: bunx expo export --platform web  

      - name: Prepare files to deploy (copy .env + ensure folders exist)
        run: |
          # Copy .env to the deploy root (or move it to build/ or dist/ if you prefer)
          # cp .env .                    # already there, but explicit

          # Optional: if you want .env inside build/ or dist/ instead
          cp -r dist/. build/dist/
          cp .env build/

      - name: Deploy build/ and dist/ + .env to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ vars.SERVER_IP }}
          username: ${{ vars.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: |
            build/
          target: "${{ vars.SERVER_DEPLOY_PATH }}"
          rm: true                      # removes files on server no longer present
          strip_components: 0           # keep the folder structure (build/ and dist/ appear on server)

      - name: Restart PM2 on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.SERVER_IP }}
          username: ${{ vars.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cd ${{ vars.SERVER_DEPLOY_PATH }}
            cd build
            export PATH="$HOME/.bun/bin:$PATH"

            echo "♻️ Restarting application..."
            pm2 delete salesmgmt-backend || true

            pm2 start server.js \
              --name salesmgmt-backend \
              --interpreter bun \
              -- --env-file .env

            # Alternative (zero-downtime reload if already running):
            # pm2 reload salesmgmt-backend -- --env-file .env || pm2 start ...

            pm2 save
            pm2 status

            echo "✅ Deployment completed!"

      - name: Deployment Status
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"  