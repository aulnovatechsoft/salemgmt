name: Deploy to Private Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Private Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.SERVER_IP }}
          username: ${{ vars.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            echo ${{ vars.SERVER_DEPLOY_PATH }}
            cd ..
            cd ..
            cd ${{ vars.SERVER_DEPLOY_PATH }}
            echo "pwd: $(pwd)"
            # Pull latest changes
            echo "📦 Pulling latest code..."
            git pull origin main || git pull origin master

            # Load environment variables
            if [ -f .env ]; then
              export $(cat .env | grep -v '#' | xargs)
            fi

            # 🔑 IMPORTANT: Load Bun into PATH
            export PATH="$HOME/.bun/bin:$PATH"

            echo "♻️ Restarting application with PM2..."
            pm2 stop salesmgmt-backend || true
            pm2 delete salesmgmt-backend || true

            pm2 start "bun run server.ts" --name salesmgmt-backend
            pm2 save

            pm2 status

            echo "✅ Deployment completed!"

      - name: Deployment Status
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
